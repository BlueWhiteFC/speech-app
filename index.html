<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>話し方練習アプリ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="スピーチ練習">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #1d1d1f; margin-bottom: 24px; font-size: 22px; }
        button {
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            margin: 8px 0;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-odai { background-color: #007aff; }
        .btn-odai:active { background-color: #0056b3; }
        #recordBtn { background-color: #34c759; }
        #recordBtn.recording { background-color: #ff3b30; animation: pulse 1.5s infinite; }
        #downloadBtn { background-color: #5856d6; display: none; }
        
        #odai {
            font-size: 18px;
            font-weight: bold;
            margin: 24px 0;
            padding: 16px;
            background-color: #f2f2f7;
            border-radius: 12px;
            min-height: 54px;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        audio { width: 100%; margin-top: 20px; border-radius: 8px; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>話し方トレーニング</h2>
    
    <button class="btn-odai" onclick="nextOdai()">🎲 お題を出す</button>
    <div id="odai">ボタンを押してお題を表示</div>
    
    <hr style="border: 0; border-top: 1px solid #e5e5ea; margin: 24px 0;">
    
    <button id="recordBtn" onclick="toggleRecording()">🎙️ 録音スタート</button>
    <audio id="audioPlayer" controls></audio>
    
    <button id="downloadBtn" onclick="downloadAudio()">📥 音声ファイルを保存</button>
</div>

<script>
    const odaiList = [
        "最近一番嬉しかったこと",
        "おすすめの買ってよかったもの",
        "10年後の自分はどうなっている？",
        "私の趣味とその魅力について",
        "昨日食べた美味しいものの食レポ",
        "自己紹介を1分間でお願いします",
        "最近イラッとしたことと、その解消法",
        "これから挑戦してみたいこと"
    ];

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    function nextOdai() {
        const randomIndex = Math.floor(Math.random() * odaiList.length);
        document.getElementById('odai').innerText = odaiList[randomIndex];
    }

    async function toggleRecording() {
        const btn = document.getElementById('recordBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        
        if (!isRecording) {
            audioChunks = [];
            // 非表示にする（新しい録音を始めるため）
            downloadBtn.style.display = 'none'; 
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    // iPhone対応のため、一般的なaudio/mp4形式でBlobを作成
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    document.getElementById('audioPlayer').src = audioUrl;
                    
                    // 録音完了したら保存ボタンを表示
                    downloadBtn.style.display = 'block';
                };

                mediaRecorder.start();
                btn.innerText = "🛑 録音を停止する";
                btn.classList.add('recording');
                isRecording = true;
            } catch (err) {
                alert("マイクのアクセスを許可してください: " + err);
            }
        } else {
            mediaRecorder.stop();
            btn.innerText = "🎙️ 録音スタート";
            btn.classList.remove('recording');
            isRecording = false;
        }
    }

    // 音声ファイルをiPhone本体に保存する関数
    function downloadAudio() {
        const audioSrc = document.getElementById('audioPlayer').src;
        if (!audioSrc) return;
        
        const a = document.createElement('a');
        a.href = audioSrc;
        // ファイル名（日時を付けると管理しやすいです）
        const now = new Date();
        const timeStr = now.getFullYear() + "" + (now.getMonth()+1) + "" + now.getDate() + "_" + now.getHours() + "" + now.getMinutes();
        a.download = `speech_${timeStr}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
